name: Tests (docker)

on:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: docker build -t cryptoguard-ci .

      - name: Build & run tests inside container
        run: |
          docker run --rm \
            --user root \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            cryptoguard-ci \
            bash -euxo pipefail -c '
              mkdir -p build
              cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release
              cmake --build . --parallel
              ctest -VV
            '